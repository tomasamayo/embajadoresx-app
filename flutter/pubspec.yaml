name: affiliatepro_mobile
description: Official mobile app for AffiliatePro SaaS platform.
publish_to: 'none'
version: 1.3.0+14

environment:
  sdk: '>=2.19.4 <3.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  get: ^4.6.5
  image: ^4.1.7
  shared_preferences: ^2.2.2
  dio: ^5.9.2
  connectivity_plus: ^6.1.1
  shimmer: ^3.0.0
  salomon_bottom_bar: ^3.3.2
  jiffy: ^6.1.0
  flutter_spinkit: ^5.1.0
  cached_network_image: ^3.2.3
  font_awesome_flutter: 10.7.0
  share_plus: ^7.2.1
  qr_flutter: ^4.0.0
  syncfusion_flutter_barcodes: ^28.1.33
  graphview: ^1.1.1
  image_picker: ^1.0.4
  matrix_gesture_detector: ^0.2.0-nullsafety.1
  pie_chart: ^5.3.2
  url_launcher: ^6.2.5
  path_provider: ^2.1.5
  open_filex: ^4.7.0
  http: any
  package_info_plus: ^4.2.0
  webview_flutter: ^4.13.0
  flutter_widget_from_html: ^0.16.1
  lottie: ^3.1.0
  flutter_staggered_animations: ^1.0.0
  animate_do: ^3.3.4
  showcaseview: ^3.0.0
  fl_chart: 0.66.0
  youtube_player_flutter: ^9.1.3
  video_player: ^2.8.2
  chewie: ^1.7.5
  in_app_purchase: ^3.2.0
  dropdown_search: ^6.0.2
  audioplayers: ^6.6.0
  dio_cookie_manager: ^3.4.0
  cookie_jar: ^4.0.9
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  flutter_local_notifications: ^19.5.0
  google_sign_in: 6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/
    - assets/config.json

  fonts:
    - family: IBMPlexSans
      fonts:
        - asset: assets/fonts/IBMPlexSans-Bold.ttf
          weight: 700

    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Black.ttf
        - asset: assets/fonts/Inter-Bold.ttf
        - asset: assets/fonts/Inter-ExtraBold.ttf
        - asset: assets/fonts/Inter-ExtraLight.ttf
        - asset: assets/fonts/Inter-Light.ttf
        - asset: assets/fonts/Inter-Medium.ttf
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-SemiBold.ttf
        - asset: assets/fonts/Inter-Thin.ttf

    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Black.ttf
        - asset: assets/fonts/Poppins-BlackItalic.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
        - asset: assets/fonts/Poppins-BoldItalic.ttf
        - asset: assets/fonts/Poppins-ExtraBold.ttf
        - asset: assets/fonts/Poppins-ExtraBoldItalic.ttf
        - asset: assets/fonts/Poppins-ExtraLight.ttf
        - asset: assets/fonts/Poppins-ExtraLightItalic.ttf
        - asset: assets/fonts/Poppins-Light.ttf
        - asset: assets/fonts/Poppins-LightItalic.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
        - asset: assets/fonts/Poppins-MediumItalic.ttf
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-SemiBold.ttf
        - asset: assets/fonts/Poppins-SemiBoldItalic.ttf
        - asset: assets/fonts/Poppins-Thin.ttf
        - asset: assets/fonts/Poppins-ThinItalic.ttf
